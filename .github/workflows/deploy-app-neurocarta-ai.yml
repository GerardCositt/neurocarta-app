name: Deploy app.neurocarta.ai (Laravel + Plesk)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-app-neurocarta-ai
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build frontend assets (Laravel Mix)
        run: |
          npm ci
          npm run production

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLESK_SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PLESK_SSH_PORT }}" "${{ secrets.PLESK_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to server (excluding vendor/node_modules/storage)
        env:
          HOST: ${{ secrets.PLESK_HOST }}
          PORT: ${{ secrets.PLESK_SSH_PORT }}
          USER: ${{ secrets.PLESK_SSH_USER }}
          APP_PATH: ${{ secrets.PLESK_APP_LARAVEL_PATH }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude "node_modules/" \
            --exclude "vendor/" \
            --exclude "storage/" \
            --exclude ".env" \
            --exclude "tests/" \
            --exclude "tests-e2e/" \
            --exclude "test-results/" \
            --exclude "playwright-report/" \
            --exclude "tmp/" \
            -e "ssh -p ${PORT}" \
            "./" \
            "${USER}@${HOST}:${APP_PATH}"

      - name: Install backend deps, link public, and bootstrap env
        env:
          HOST: ${{ secrets.PLESK_HOST }}
          PORT: ${{ secrets.PLESK_SSH_PORT }}
          USER: ${{ secrets.PLESK_SSH_USER }}
          APP_PATH: ${{ secrets.PLESK_APP_LARAVEL_PATH }}
        run: |
          ssh -p "${PORT}" "${USER}@${HOST}" "bash -lc 'set -euo pipefail
            cd \"${APP_PATH}\"

            # Laravel necesita estas rutas existentes antes de correr cualquier artisan
            mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache
            chmod -R ug+rwX storage bootstrap/cache || true

            if command -v composer >/dev/null 2>&1; then
              composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader --no-scripts
            else
              php -r \"copy(\\\"https://getcomposer.org/installer\\\", \\\"composer-setup.php\\\");\"
              php composer-setup.php --quiet
              php composer.phar install --no-dev --prefer-dist --no-interaction --optimize-autoloader --no-scripts
            fi

            # Publicación en Plesk: copiamos el contenido de public/ a httpdocs/public/
            # (más compatible que symlink cuando el document root apunta a /public)
            mkdir -p \"\\$HOME/app.neurocarta.ai/httpdocs/public\"
            rsync -az --delete \"${APP_PATH}/public/\" \"\\$HOME/app.neurocarta.ai/httpdocs/public/\"

            if [ ! -f .env ]; then
              cp .env.example .env
              php artisan key:generate --force

              SQLITE_PATH=\"${APP_PATH}/database/database.sqlite\"
              mkdir -p \"${APP_PATH}/database\"
              touch \"$SQLITE_PATH\"

              php -r \"\$f=\\\".env\\\"; \$c=file_get_contents(\$f);
                \$c=preg_replace('/^APP_ENV=.*/m','APP_ENV=production',\$c);
                \$c=preg_replace('/^APP_DEBUG=.*/m','APP_DEBUG=false',\$c);
                \$c=preg_replace('/^APP_URL=.*/m','APP_URL=https://app.neurocarta.ai',\$c);
                \$c=preg_replace('/^DB_CONNECTION=.*/m','DB_CONNECTION=sqlite',\$c);
                \$c=preg_replace('/^DB_DATABASE=.*/m','DB_DATABASE=' . addcslashes(\\\"$SQLITE_PATH\\\", '\\\\'),\$c);
                file_put_contents(\$f,\$c);\"

              php artisan migrate --force || true
            fi

            php artisan package:discover --ansi || true
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true

            chmod -R ug+rwX storage bootstrap/cache || true
          '"

