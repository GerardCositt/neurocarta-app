name: Deploy to Jotelulu

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 149.71.98.240
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: /opt/neurocarta/deploy.sh
