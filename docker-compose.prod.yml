# Ejemplo de pila lista para publicar: app + MariaDB
# Uso:
#   cp .env.example .env
#   # Edita .env: APP_URL, APP_KEY, DB_* (host mysql, base carta, user carta, pass …)
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app php artisan key:generate --force
#   docker compose -f docker-compose.prod.yml exec app php artisan migrate --force
#   docker compose -f docker-compose.prod.yml exec app php artisan db:seed --force
#   docker compose -f docker-compose.prod.yml exec app php artisan demo:prepare
#
# Demo pública (ajusta dominio y ?restaurant= según tu seed):
#   https://tu-dominio.com/?restaurant=1

services:
  app:
    build: .
    ports:
      - "${APP_PUBLISH_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - app_storage:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mariadb:10.11
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-carta_v2}
      MYSQL_USER: ${DB_USERNAME:-carta}
      MYSQL_PASSWORD: ${DB_PASSWORD:-carta}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootchange}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  app_storage:
